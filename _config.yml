# Active site configuration.
# Optional template settings and example defaults live in `_config.reference.yml`.

locale: en-US
title: "Cason Konzer"
title_separator: "-"
name: &name "Cason Konzer"
description: &description "Data Systems Engineer at Bosch and computer science M.S. student and research assistant at the University of Michigan-Flint."
url: "https://casonk.github.io"
baseurl: ""
repository: "casonk/casonk.github.io"
github: false # Keep GitHub metadata disabled for now; re-enable later with token-backed metadata if needed.
breadcrumbs: false
future: false
read_more: "disabled"
talkmap_link: false

social:
  name: *name
  links:
    - "https://github.com/casonk"
    - "https://www.linkedin.com/in/cason-k-395761187/"

author:
  name: "Cason Konzer"
  avatar: "casonk_headshot.jpg"
  bio: "Data Systems Engineer at Bosch and computer science M.S. student and research assistant at the University of Michigan-Flint."
  location: "Michigan, USA"
  employer: "Robert Bosch LLC"
  email: "casonk@umich.edu"
  github: "casonk"
  linkedin: "cason-k-395761187/"

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - CHANGELOG.md
  - Capfile
  - CONTRIBUTING.md
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - README.md
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - files/paper1.pdf
  - files/paper2.pdf
  - files/paper3.pdf
  - gulpfile.js
  - log
  - markdown_generator
  - node_modules
  - package.json
  - talkmap
  - talkmap.ipynb
  - talkmap.py
  - tmp
  - vendor
  - _pages/archive-layout-with-content.md
  - _pages/category-archive.html
  - _pages/collection-archive.html
  - _pages/markdown.md
  - _pages/non-menu-page.md
  - _pages/page-archive.html
  - _pages/sitemap.md
  - _pages/tag-archive.html
  - _pages/talkmap.html
  - _pages/terms.md
  - _portfolio/portfolio-1.md
  - _portfolio/portfolio-2.html
  - _posts/2012-08-14-blog-post-1.md
  - _posts/2013-08-14-blog-post-2.md
  - _posts/2014-08-14-blog-post-3.md
  - _posts/2015-08-14-blog-post-4.md
  - _posts/2199-01-01-future-post.md
  - _publications/2009-10-01-paper-title-number-1.md
  - _publications/2010-10-01-paper-title-number-2.md
  - _publications/2015-10-01-paper-title-number-3.md
  - _talks/2012-03-01-talk-1.md
  - _talks/2013-03-01-tutorial-1.md
  - _talks/2014-02-01-talk-2.md
  - _talks/2014-03-01-talk-3.md
  - _teaching/2014-spring-teaching-1.md
  - _teaching/2015-spring-teaching-2.md

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
  - scope:
      path: ""
      type: pages
    values:
      layout: single
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
  - scope:
      path: ""
      type: publications
    values:
      layout: single
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
  - scope:
      path: ""
      type: talks
    values:
      layout: talk

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: America/Detroit
